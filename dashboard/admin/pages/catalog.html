<div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
    <div class="relative w-full md:w-72">
        <i class="bi bi-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
        <input type="text" class="w-full bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-2xl py-3.5 pl-12 pr-4 text-sm font-bold text-ink dark:text-white placeholder-gray-400 focus:border-holiday outline-none transition-all shadow-[0_4px_20px_rgb(0,0,0,0.02)]" placeholder="Cari destinasi wisata...">
    </div>
    
    <div class="flex items-center gap-3 w-full md:w-auto">
        <!-- View Toggle Apple Style -->
        <div class="bg-white dark:bg-gray-800 p-1 rounded-2xl border border-gray-100 dark:border-gray-700 shadow-[0_4px_20px_rgb(0,0,0,0.02)] flex gap-1 relative overflow-hidden">

        </div>
        
        <button onclick="openModal('modal-add')" class="flex-grow md:flex-grow-0 bg-ink text-white px-6 py-3.5 rounded-2xl font-extrabold text-sm hover:bg-black transition-all shadow-[0_8px_20px_rgb(0,0,0,0.1)] hover:-translate-y-0.5 flex items-center justify-center gap-2">
            <i class="bi bi-plus-lg"></i> Tambah Wisata
        </button>

</div>

<!-- Catalog Container -->
<div id="catalog-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 transition-all duration-500">
    <!-- Item 1 -->
    <div class="catalog-card bg-white dark:bg-gray-800 rounded-[2rem] p-5 shadow-[0_8px_30px_rgb(0,0,0,0.02)] dark:shadow-[0_8px_30px_rgb(0,0,0,0.2)] border border-gray-100/50 dark:border-gray-700/50 flex flex-col hover:shadow-[0_8px_30px_rgb(0,0,0,0.06)] dark:hover:shadow-[0_8px_30px_rgb(0,0,0,0.4)] transition-all relative group">
        <div class="img-wrapper w-full h-56 relative rounded-2xl overflow-hidden mb-5">
            <img src="../img/djawatan.png" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" alt="De Djawatan">
            <div class="absolute top-3 left-3 px-3 py-1 bg-white/90 backdrop-blur text-green-700 text-[10px] font-extrabold rounded-full uppercase tracking-widest shadow-sm">Aktif</div>
        </div>
        
        <div class="content-wrapper flex flex-col flex-grow">
            <div class="flex justify-between items-start mb-2">
                <h3 class="font-extrabold text-ink dark:text-white text-xl line-clamp-1">De Djawatan Premium</h3>
                
                <!-- Apple Dropdown Action -->
                <div class="relative">
                    <button onclick="toggleActionMenu('menu-1')" class="w-8 h-8 rounded-full bg-gray-50 dark:bg-gray-700 text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-600 hover:text-ink dark:hover:text-white flex items-center justify-center transition-colors">
                        <i class="bi bi-three-dots"></i>
                    </button>
                    <!-- Dropdown Content -->
                    <div id="menu-1" class="absolute right-0 top-full mt-2 w-40 bg-white/80 dark:bg-gray-800/90 backdrop-blur-xl border border-gray-100 dark:border-gray-700 rounded-2xl shadow-[0_20px_40px_rgb(0,0,0,0.1)] overflow-hidden z-20 origin-top-right scale-95 opacity-0 invisible transition-all duration-300">
                        <button onclick="openModal('modal-add'); toggleActionMenu('menu-1')" class="w-full text-left px-4 py-3 text-sm font-bold text-gray-700 dark:text-gray-200 hover:bg-gray-50/80 dark:hover:bg-gray-700 hover:text-blue-600 dark:hover:text-blue-400 transition-colors flex items-center gap-3">
                            <i class="bi bi-pencil-square"></i> Edit Data
                        </button>
                        <div class="h-px bg-gray-100 dark:bg-gray-700 w-full"></div>
                        <button onclick="openModal('modal-delete'); toggleActionMenu('menu-1')" class="w-full text-left px-4 py-3 text-sm font-bold text-red-600 dark:text-red-400 hover:bg-red-50/80 dark:hover:bg-red-900/30 transition-colors flex items-center gap-3">
                            <i class="bi bi-trash"></i> Hapus
                        </button>
                    </div>
                </div>
            </div>
            <p class="desc text-sm font-medium text-gray-500 dark:text-gray-400 mb-6 line-clamp-2">Jelajahi keindahan hutan trembesi raksasa peninggalan Belanda dengan fasilitas VIP eksklusif.</p>
            
            <div class="flex justify-between items-end mt-auto pt-4 border-t border-gray-100/50 dark:border-gray-700/50">
                <div>
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Mulai Dari</p>
                    <span class="font-extrabold text-holiday dark:text-holiday-light text-lg">Rp 850.000</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Item 2 -->
    <div class="catalog-card bg-white rounded-[2rem] p-5 shadow-[0_8px_30px_rgb(0,0,0,0.02)] border border-gray-100/50 flex flex-col hover:shadow-[0_8px_30px_rgb(0,0,0,0.06)] transition-all relative group">
        <div class="img-wrapper w-full h-56 relative rounded-2xl overflow-hidden mb-5 bg-gray-100 flex items-center justify-center">
            <i class="bi bi-image text-4xl text-gray-300"></i>
            <div class="absolute top-3 left-3 px-3 py-1 bg-white/90 backdrop-blur text-gray-500 text-[10px] font-extrabold rounded-full uppercase tracking-widest shadow-sm">Draft</div>
        </div>
        
        <div class="content-wrapper flex flex-col flex-grow">
            <div class="flex justify-between items-start mb-2">
                <h3 class="font-extrabold text-ink text-xl line-clamp-1">Kawah Ijen Sunrise</h3>
                
                <div class="relative">
                    <button onclick="toggleActionMenu('menu-2')" class="w-8 h-8 rounded-full bg-gray-50 text-gray-500 hover:bg-gray-100 hover:text-ink flex items-center justify-center transition-colors">
                        <i class="bi bi-three-dots"></i>
                    </button>
                    <div id="menu-2" class="absolute right-0 top-full mt-2 w-40 bg-white/80 backdrop-blur-xl border border-gray-100 rounded-2xl shadow-[0_20px_40px_rgb(0,0,0,0.1)] overflow-hidden z-20 origin-top-right scale-95 opacity-0 invisible transition-all duration-300">
                        <button class="w-full text-left px-4 py-3 text-sm font-bold text-gray-700 hover:bg-gray-50/80 hover:text-blue-600 transition-colors flex items-center gap-3">
                            <i class="bi bi-pencil-square"></i> Edit Data
                        </button>
                        <div class="h-px bg-gray-100 w-full"></div>
                        <button class="w-full text-left px-4 py-3 text-sm font-bold text-red-600 hover:bg-red-50/80 transition-colors flex items-center gap-3">
                            <i class="bi bi-trash"></i> Hapus
                        </button>
                    </div>
                </div>
            </div>
            <p class="desc text-sm font-medium text-gray-500 mb-6 line-clamp-2">Saksikan keajaiban api biru kawah Ijen di pagi hari beserta tur lengkap.</p>
            
            <div class="flex justify-between items-end mt-auto pt-4 border-t border-gray-100/50">
                <div>
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Mulai Dari</p>
                    <span class="font-extrabold text-gray-600 text-lg">Rp 450.000</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Make variables and functions global so they persist when re-injected
    window.currentActiveMenu = null;

    // Apple Style Dropdown Toggle
    window.toggleActionMenu = function(id) {
        const menu = document.getElementById(id);
        
        // Close currently active if different
        if (window.currentActiveMenu && window.currentActiveMenu !== menu) {
            closeActionMenu(window.currentActiveMenu);
        }

        if (menu.classList.contains('invisible')) {
            // Open
            menu.classList.remove('invisible', 'scale-95', 'opacity-0');
            menu.classList.add('scale-100', 'opacity-100');
            window.currentActiveMenu = menu;
        } else {
            // Close
            closeActionMenu(menu);
            window.currentActiveMenu = null;
        }
    };

    window.closeActionMenu = function(menu) {
        if(!menu) return;
        menu.classList.remove('scale-100', 'opacity-100');
        menu.classList.add('scale-95', 'opacity-0');
        setTimeout(() => {
            menu.classList.add('invisible');
        }, 300);
    };

    // Close menu when clicking outside
    document.addEventListener('click', (e) => {
        if (window.currentActiveMenu && !e.target.closest('.relative')) {
            closeActionMenu(window.currentActiveMenu);
            window.currentActiveMenu = null;
        }
    });

    // View Toggle Logic
    window.changeView = function(type, btn) {
        const container = document.getElementById('catalog-container');
        const indicator = document.getElementById('view-indicator');
        const btns = document.querySelectorAll('.view-btn');
        
        // Update Buttons Color
        btns.forEach(b => {
            b.classList.remove('text-ink');
            b.classList.add('text-gray-400');
        });
        btn.classList.remove('text-gray-400');
        btn.classList.add('text-ink');

        // Move indicator
        if(type === 'grid') {
            indicator.style.transform = 'translateX(0)';
            
            // Transform to Grid
            gsap.to(container, { opacity: 0, duration: 0.2, onComplete: () => {
                container.className = 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 transition-all duration-500';
                document.querySelectorAll('.catalog-card').forEach(card => {
                    card.classList.remove('flex-row', 'items-center', 'h-40');
                    card.classList.add('flex-col');
                    card.querySelector('.img-wrapper').className = 'img-wrapper w-full h-56 relative rounded-2xl overflow-hidden mb-5 shrink-0';
                    card.querySelector('.content-wrapper').classList.remove('ml-6', 'w-full');
                    card.querySelector('.desc').classList.add('line-clamp-2');
                    card.querySelector('.desc').classList.remove('line-clamp-1', 'mb-2');
                });
                gsap.to(container, { opacity: 1, duration: 0.3 });
            }});

        } else {
            indicator.style.transform = 'translateX(46px)';
            
            // Transform to List
            gsap.to(container, { opacity: 0, duration: 0.2, onComplete: () => {
                container.className = 'flex flex-col gap-4 transition-all duration-500';
                document.querySelectorAll('.catalog-card').forEach(card => {
                    card.classList.remove('flex-col');
                    card.classList.add('flex-row', 'items-center', 'h-40');
                    card.querySelector('.img-wrapper').className = 'img-wrapper w-48 h-full relative rounded-[1.25rem] overflow-hidden shrink-0 mb-0';
                    card.querySelector('.content-wrapper').classList.add('ml-6', 'w-full', 'py-1');
                    card.querySelector('.desc').classList.remove('line-clamp-2');
                    card.querySelector('.desc').classList.add('line-clamp-1', 'mb-2');
                });
                gsap.to(container, { opacity: 1, duration: 0.3 });
            }});
        }
    };

    // Re-declare modalsHTML
    const modalsHTML = `
        <!-- Modal Tambah/Edit (Apple Style Drop & Blur) -->
        <div id="modal-add" class="fixed inset-0 bg-ink/60 backdrop-blur-md z-[100] hidden items-center justify-center opacity-0 transition-opacity duration-400">
            <div class="bg-white/90 backdrop-blur-xl border border-white/50 rounded-[2.5rem] w-full max-w-2xl mx-4 overflow-hidden shadow-[0_30px_60px_rgba(0,0,0,0.12)] modal-content scale-95 opacity-0 transition-all duration-400 ease-[cubic-bezier(0.34,1.56,0.64,1)] flex flex-col max-h-[90vh]">
                <div class="px-8 py-6 border-b border-gray-200/50 flex justify-between items-center">
                    <h2 class="text-xl font-extrabold text-ink tracking-tight">Data Wisata</h2>
                    <button onclick="closeModal('modal-add')" class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-500 hover:bg-gray-200 hover:text-ink transition-colors"><i class="bi bi-x-lg text-sm"></i></button>
                </div>
                <div class="p-8 overflow-y-auto flex-grow space-y-6">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Nama Wisata</label>
                        <input type="text" class="w-full bg-white border border-gray-200/60 rounded-2xl px-5 py-4 text-sm font-bold text-ink shadow-sm focus:border-holiday outline-none transition-colors" placeholder="Masukkan nama wisata">
                    </div>
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Harga (Rp)</label>
                            <input type="number" class="w-full bg-white border border-gray-200/60 rounded-2xl px-5 py-4 text-sm font-bold text-ink shadow-sm focus:border-holiday outline-none transition-colors" placeholder="Contoh: 850000">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Status</label>
                            <select class="w-full bg-white border border-gray-200/60 rounded-2xl px-5 py-4 text-sm font-bold text-ink shadow-sm focus:border-holiday outline-none transition-colors appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20width%3D%2220%22%20height%3D%2220%22%20viewBox%3D%220%22%200%2020%2020%22%20fill%3D%22none%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%3E%3Cpath%20d%3D%22M5%207.5L10%2012.5L15%207.5%22%20stroke%3D%22%236B7280%22%20stroke-width%3D%221.5%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%2F%3E%3C%2Fsvg%3E')] bg-no-repeat bg-[position:right_1rem_center]">
                                <option>Aktif</option>
                                <option>Draft</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Deskripsi</label>
                        <textarea class="w-full bg-white border border-gray-200/60 rounded-2xl px-5 py-4 text-sm font-medium text-ink shadow-sm focus:border-holiday outline-none h-28 resize-none transition-colors" placeholder="Ceritakan detail menarik tentang tempat ini..."></textarea>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Upload Gambar</label>
                        <div class="border-2 border-dashed border-gray-300 rounded-[2rem] p-10 flex flex-col items-center justify-center text-gray-400 bg-gray-50/50 hover:bg-holiday/5 hover:text-holiday hover:border-holiday transition-all cursor-pointer">
                            <div class="w-16 h-16 bg-white rounded-full shadow-sm flex items-center justify-center mb-4">
                                <i class="bi bi-image text-2xl"></i>
                            </div>
                            <span class="text-sm font-extrabold text-ink mb-1">Klik untuk upload</span>
                            <span class="text-xs font-medium">atau seret gambar ke area ini</span>
                        </div>
                    </div>
                </div>
                <div class="px-8 py-6 border-t border-gray-200/50 flex justify-end gap-3 bg-gray-50/80">
                    <button onclick="closeModal('modal-add')" class="px-8 py-3.5 rounded-2xl font-extrabold text-gray-500 hover:bg-white shadow-sm transition-all text-sm">Batal</button>
                    <button onclick="closeModal('modal-add')" class="px-8 py-3.5 rounded-2xl font-extrabold text-white bg-ink hover:bg-black transition-all shadow-[0_8px_20px_rgba(0,0,0,0.15)] hover:-translate-y-0.5 text-sm">Simpan Wisata</button>
                </div>
            </div>
        </div>

        <!-- Modal Delete (Apple Alert Style) -->
        <div id="modal-delete" class="fixed inset-0 bg-ink/60 backdrop-blur-md z-[100] hidden items-center justify-center opacity-0 transition-opacity duration-400">
            <div class="bg-white/90 backdrop-blur-xl border border-white/50 rounded-[2.5rem] w-full max-w-sm mx-4 p-8 text-center shadow-[0_30px_60px_rgba(0,0,0,0.12)] modal-content scale-95 opacity-0 transition-all duration-400 ease-[cubic-bezier(0.34,1.56,0.64,1)]">
                <div class="w-20 h-20 bg-red-50 text-red-600 rounded-full flex items-center justify-center text-3xl mx-auto mb-6 shadow-inner">
                    <i class="bi bi-trash3-fill"></i>
                </div>
                <h2 class="text-2xl font-extrabold text-ink mb-3 tracking-tight">Hapus Wisata?</h2>
                <p class="text-gray-500 text-sm font-medium mb-8 leading-relaxed">Wisata ini akan dihapus permanen dari sistem beserta seluruh data terkaitnya.</p>
                <div class="flex flex-col gap-3">
                    <button onclick="closeModal('modal-delete')" class="w-full py-4 bg-red-600 text-white font-extrabold text-sm rounded-2xl hover:bg-red-700 transition-all shadow-[0_8px_20px_rgba(220,38,38,0.25)] hover:-translate-y-0.5">Ya, Hapus</button>
                    <button onclick="closeModal('modal-delete')" class="w-full py-4 bg-gray-100 text-gray-600 font-extrabold text-sm rounded-2xl hover:bg-gray-200 transition-all">Batal</button>
                </div>
            </div>
        </div>
    `;

    document.getElementById('modals-container').innerHTML = modalsHTML;

    window.openModal = function(id) {
        const modal = document.getElementById(id);
        const content = modal.querySelector('.modal-content');
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        
        setTimeout(() => {
            modal.classList.remove('opacity-0');
            content.classList.remove('scale-95', 'opacity-0');
            content.classList.add('scale-100', 'opacity-100');
        }, 10);
    }

    window.closeModal = function(id) {
        const modal = document.getElementById(id);
        const content = modal.querySelector('.modal-content');
        modal.classList.add('opacity-0');
        content.classList.remove('scale-100', 'opacity-100');
        content.classList.add('scale-95', 'opacity-0');
        
        setTimeout(() => {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }, 400);
    }
</script>
